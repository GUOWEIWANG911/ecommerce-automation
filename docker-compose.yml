version: '3.8'

services:
  test-runner:
    build: .
    # 挂载结果目录，实现测试与报告容器共享数据
    volumes:
      - ./allure-results:/app/allure-results
    environment:
      # 测试输出目录（容器内路径）
      - PYTEST_ADDOPTS=--alluredir=/app/allure-results
      # 浏览器配置：本地默认有头模式，CI 环境自动切换无头模式
      - CHROME_OPTIONS=${CHROME_OPTIONS:---headless=new}
      # 测试账号密码；优先使用环境变量，本地开发可写死
      - TEST_USERNAME=${TEST_USERNAME}
      - TEST_PASSWORD=${TEST_PASSWORD}
      - BASE_URL=${BASE_URL:-https://www.petstore.com}
    # CI 环境中，测试容器退出后自动停止所有服务
    # 本地开发时，可以注释掉下面两行，保持 Allure 服务持续运行
    profiles:
      - ci
      

  allure:
    image: frankescobar/allure-docker-service
    ports:
      - "5050:5050"
    volumes:
      - ./allure-results:/app/allure-results
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=1
      - KEEP_HISTORY=1
      # 安全配置：CI 环境建议开启，本地开发可关闭
      - SECURITY_ENABLED=${SECURITY_ENABLED:-false}
      - SECURITY_USER=${SECURITY_USER:-admin}
      - SECURITY_PASSWORD=${SECURITY_PASSWORD:-admin}